<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles/styleex1.css">
    <title>Exercícios</title>
</head>
<body>
    <h1>1. Mudar Texto</h1>
    <h3 id="titulo">Clique no botão</h3>
    <button id="btnMudarTitulo">Mudar</button>

    <h1>2. Toggle Classe</h1>
    <div id="caixa">Minha caixa</div>
    <button id="btnToggleClasse">Toggle</button>

    <h1>3. Adicionar Item</h1>
    <ul id="lista">
        <li>Item 1</li>
    </ul>
    <button id="btnAdicionarItem">Adicionar</button>

    <h1>4. Remover Elemento</h1>
    <div id="elementoRemover">Elemento que pode ser removido</div>
    <button id="btnRemoverElemento">Remover</button>

    <h1>5. Texto em Tempo Real</h1>
    <input type="text" id="inputTexto" placeholder="Digite...">
    <p id="textoEmTempo"></p>

</body>
</html>
    <script src="./scripts/scriptex1.js"></script>
</body>
</html>
